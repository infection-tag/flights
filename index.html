<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Global Flight Tracker</title>
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
  <script src="https://unpkg.com/globe.gl"></script>

  <style>
    /* Document Setup */
    html, body, #app { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      background: #000; 
      font-family: system-ui, -apple-system, sans-serif;
    }
    
    #globeViz { 
      width: 100%; 
      height: 100%; 
      display: block; 
    }

    /* Globe Label Tooltip Layout */
    .globe-tooltip {
      padding: 8px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #334155;
      border-radius: 4px;
      font-family: sans-serif;
    }
  </style>
</head>
<body>

  <div id="app">
    <router-view></router-view>
  </div>

  <script src="./destinations/bangui.js"></script>
  <script src="./destinations/kinshasa.js"></script>
  <script src="./destinations/new-delhi.js"></script>
  <script src="./destinations/paris.js"></script>
  <script src="./destinations/shanghai.js"></script>
  <script src="./destinations/taipei.js"></script>
  <script src="./destinations/tel-aviv.js"></script>
  
<script>
    const { ref, onMounted } = Vue;
    const { createRouter, createWebHashHistory } = VueRouter;

    // Define your destination coordinates directly in the code to prevent 404 fetch errors!
    const flightDestinations = [
      { name: "Bangui-M'poko International (BGF)", lat: 4.3984, lng: 18.5188, price: "Highly Elevated", url: "/bangui" },
      { name: "Charles de Gaulle International (CDG)", lat: 49.0097, lng: 2.5479, price: "+12-20% Surcharge", url: "/paris" },
      { name: "N'djili International (FIH)", lat: -4.3858, lng: 15.4445, price: "Elevated Premium", url: "/kinshasa" },
      { name: "Indira Gandhi International (DEL)", lat: 28.5562, lng: 77.1000, price: "Fluctuating", url: "/new-delhi" },
      { name: "Shanghai Pudong International (PVG)", lat: 31.1443, lng: 121.8083, price: "Route Altered", url: "/shanghai" },
      { name: "Taoyuan International (TPE)", lat: 25.0797, lng: 121.2342, price: "Congested Path", url: "/taipei" },
      { name: "Ben Gurion International (TLV)", lat: 32.0055, lng: 34.8854, price: "Conflict Risk Premium", url: "/tel-aviv" }
    ];

    const HomeGlobe = {
      template: `<div id="globeViz" ref="globeViz"></div>`,
      setup() {
        const globeViz = ref(null);
        
        onMounted(() => {
          // Initialize World Container
          const world = Globe()(globeViz.value)
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
            .showAtmosphere(true)
            .atmosphereColor('lightskyblue')
            .atmosphereAltitude(0.2);

          world.controls().autoRotate = true; // Let's spin it a bit!
          world.controls().autoRotateSpeed = 0.5;
          world.controls().enablePan = false;
          world.controls().enableZoom = true;
          world.controls().enableDamping = true;

          // Global SFO Coordinates
          const SFO_LAT = 37.6213;
          const SFO_LNG = -122.3790;

          const sfoAirport = {
            lat: SFO_LAT,
            lng: SFO_LNG,
            name: "San Francisco International (SFO)",
            price: "Origin Hub",
            url: "#"
          };

          // Map Layer Logic Builder
          function initializeFlightMap(destinations) {
            world
              .arcStartLat(d => d.startLat)
              .arcStartLng(d => d.startLng)
              .arcEndLat(d => d.endLat)
              .arcEndLng(d => d.endLng)
              .arcColor(() => ['#00ffcc', '#ff9f43'])
              .arcAltitude(0.25) 
              .arcStroke(1);     

            const allAirports = [sfoAirport, ...destinations];

            world.labelsData(allAirports)
              .labelLat(d => d.lat)
              .labelLng(d => d.lng)
              .labelText(d => d.name)
              .labelSize(1.3)
              .labelDotRadius(0.5)
              .labelColor(d => d.name.includes("SFO") ? '#00ffcc' : '#ff9f43')
              .labelLabel(d => `
                  <div class="globe-tooltip">
                    <strong style="color: ${d.name && d.name.includes('SFO') ? '#00ffcc' : '#ff9f43'}; font-size: 14px;">${d.name || "Flight Route"}</strong>
                    <div style="color: #00ffcc; font-size: 12px; margin-top: 4px;">Price: ${d.price || "Click to view"}</div>
                    <div style="font-size: 11px; margin-top: 8px; color: #fff; opacity:0.6;">👉 Learn more about this price</div>
                  </div>
                `)
              .onLabelHover(hoveredPoint => {
                if (hoveredPoint && !hoveredPoint.name.includes("SFO")) {
                  const flightPath = {
                    startLat: SFO_LAT,
                    startLng: SFO_LNG,
                    endLat: hoveredPoint.lat,
                    endLng: hoveredPoint.lng,
                    price: hoveredPoint.price
                  };
                  world.arcsData([flightPath]);
                } else {
                  world.arcsData([]); 
                }
              })
              .onLabelClick(d => {
                if (d.url && d.url !== "#") {
                  window.location.hash = d.url; // Transitions using Hash Router
                }
              });
          }

          // Pass your hardcoded array data directly to the globe map initialization
          initializeFlightMap(flightDestinations);
        });

        return { globeViz };
      }
    };

    // Router Configuration Map
    const router = createRouter({
      history: createWebHashHistory(),
      routes: [
        { path: '/', component: HomeGlobe },
        { path: '/bangui', component: BanguiDestination },
        { path: '/kinshasa', component: KinshasaDestination },
        { path: '/new-delhi', component: NewDelhiDestination },
        { path: '/paris', component: ParisDestination },
        { path: '/shanghai', component: ShanghaiDestination },
        { path: '/taipei', component: TaipeiDestination },
        { path: '/tel-aviv', component: TelAvivDestination }
      ]
    });

    const app = Vue.createApp({});
    app.use(router);
    app.mount('#app');
  </script>
</body>
</html>

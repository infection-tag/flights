<script src="https://unpkg.com/globe.gl"></script>
<div id="globeViz"></div>

<script>
const world = Globe()(document.getElementById('globeViz'))
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
  .showAtmosphere(true)
  .atmosphereColor('lightskyblue')
  .atmosphereAltitude(0.2);

world.controls().autoRotate = false;
world.controls().enablePan = false;
world.controls().enableZoom = true;
world.controls().enableDamping = true;

// 1. GLOBAL ORIGIN (Defined once, used everywhere)
const SFO_LAT = 37.6213;
const SFO_LNG = -122.3790;

const sfoAirport = {
  lat: SFO_LAT,
  lng: SFO_LNG,
  name: "San Francisco International (SFO)",
  price: "Origin Hub",
  url: "#"
};

// 2. Setup the Interactive Map Layers
function initializeFlightMap(destinations) {
  
  // === THE FIX ===
  // Tell the engine HOW to draw arcs BEFORE handling any hover actions
  world
    .arcStartLat(d => d.startLat)
    .arcStartLng(d => d.startLng)
    .arcEndLat(d => d.endLat)
    .arcEndLng(d => d.endLng)
    .arcColor(() => ['#00ffcc', '#ff9f43'])
    .arcAltitude(0.25) 
    .arcStroke(1);     // Bumped thickness up slightly so it's highly visible

  const allAirports = [sfoAirport, ...destinations];

  world.labelsData(allAirports)
    .labelLat(d => d.lat)
    .labelLng(d => d.lng)
    .labelText(d => d.name)
    .labelSize(1.3)
    .labelDotRadius(0.5)
    .labelColor(d => d.name.includes("SFO") ? '#00ffcc' : '#ff9f43')
    
.labelLabel(d => `
        <div class="globe-tooltip">
          <strong style="color: ${d.name && d.name.includes('SFO') ? '#00ffcc' : '#ff9f43'}; font-size: 14px;">${d.name || "Flight Route"}</strong>
          <div style="color: #00ffcc; font-size: 12px; margin-top: 4px;">Price: ${d.price || "Click to view"}</div>
          <div style="font-size: 11px; margin-top: 8px; color: #fff; opacity:0.6;">👉 Learn more about this price</div>
        </div>
      `)
    
    // HOVER LOGIC: Generates the flightPath coordinates seamlessly
    .onLabelHover(hoveredPoint => {
      if (hoveredPoint && !hoveredPoint.name.includes("SFO")) {
        const flightPath = {
          startLat: SFO_LAT,
          startLng: SFO_LNG,
          endLat: hoveredPoint.lat,
          endLng: hoveredPoint.lng,
          price: hoveredPoint.price
        };
        world.arcsData([flightPath]);
      } else {
        world.arcsData([]); 
      }
    })
    
    .onLabelClick(d => {
      if (d.url && d.url !== "#") {
        window.open(d.url, '_blank');
      }
    });
}

// Render initial empty map
initializeFlightMap([]);

// 4. Fetch the cleaned JSON
fetch('./data.json')
  .then(res => res.json())
  .then(jsonData => {
    initializeFlightMap(jsonData);
  })
  .catch(err => {
    console.log("Awaiting data.json stream...");
  });
</script>
<script type="application/json" id="data">

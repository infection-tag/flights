<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Global Flight Tracker</title>
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
  <script src="https://unpkg.com/globe.gl"></script>

  <style>
    html, body, #app { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      background: #000; 
      font-family: system-ui, -apple-system, sans-serif;
    }
    
    #globeViz { 
      width: 100%; 
      height: 100%; 
      display: block; 
    }

    .globe-tooltip {
      padding: 8px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #334155;
      border-radius: 4px;
      font-family: sans-serif;
    }
  </style>
</head>
<body>

  <div id="app">
    <router-view></router-view>
  </div>

  <script src="./destinations/bangui.js"></script>
  <script src="./destinations/kinshasa.js"></script>
  <script src="./destinations/new-delhi.js"></script>
  <script src="./destinations/paris.js"></script>
  <script src="./destinations/shanghai.js"></script>
  <script src="./destinations/taipei.js"></script>
  <script src="./destinations/tel-aviv.js"></script>
  
  <script>
    const { ref, onMounted } = Vue;
    const { createRouter, createWebHashHistory } = VueRouter;

    // Fallback safe components in case any individual destination file fails to load
    const DummyComponent = { template: '<div style="color: white; padding: 20px;">Destination Data Loading...</div>' };

    const HomeGlobe = {
      template: `<div id="globeViz" ref="globeViz"></div>`,
      setup() {
        const globeViz = ref(null);
        
        onMounted(() => {
          const world = Globe()(globeViz.value)
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
            .showAtmosphere(true)
            .atmosphereColor('lightskyblue')
            .atmosphereAltitude(0.2);

          world.controls().autoRotate = false;
          world.controls().enablePan = false;
          world.controls().enableZoom = true;
          world.controls().enableDamping = true;

          const SFO_LAT = 37.6213;
          const SFO_LNG = -122.3790;

          const sfoAirport = {
            lat: SFO_LAT,
            lng: SFO_LNG,
            name: "San Francisco International (SFO)",
            price: "Origin Hub",
            url: "#"
          };

          function initializeFlightMap(destinations) {
            world
              .arcStartLat(d => d.startLat)
              .arcStartLng(d => d.startLng)
              .arcEndLat(d => d.endLat)
              .arcEndLng(d => d.endLng)
              .arcColor(() => ['#00ffcc', '#ff9f43'])
              .arcAltitude(0.25) 
              .arcStroke(1);     

            world.arcsData([]);

            const allAirports = [sfoAirport, ...destinations];

            world.labelsData(allAirports)
              .labelLat(d => d.lat)
              .labelLng(d => d.lng)
              .labelText(d => d.name)
              .labelSize(1.3)
              .labelDotRadius(0.5)
              .labelColor(d => d.name.includes("SFO") ? '#00ffcc' : '#ff9f43')
              .labelLabel(d => {
                if (d.name.includes("SFO")) return '';
                return `
                  <div class="globe-tooltip">
                    <strong style="color: #ff9f43; font-size: 14px;">${d.name || "Flight Route"}</strong>
                    <div style="color: #00ffcc; font-size: 12px; margin-top: 4px;">Price: ${d.price === "$0" ? "Calculating..." : d.price}</div>
                    <div style="font-size: 11px; margin-top: 8px; color: #fff; opacity:0.6;">👉 Click to view analysis</div>
                  </div>
                `;
              })
              .onLabelHover(hoveredPoint => {
                if (!hoveredPoint || hoveredPoint.name.includes("SFO")) {
                  world.arcsData([]);
                  return;
                }
                const dynamicPath = [{
                  startLat: SFO_LAT,
                  startLng: SFO_LNG,
                  endLat: hoveredPoint.lat,
                  endLng: hoveredPoint.lng
                }];
                world.arcsData(dynamicPath);
              })
              .onLabelClick(d => {
                if (d.url && d.url !== "#") {
                  window.location.hash = d.url; 
                }
              });
          }

          fetch('./data.json')
            .then(res => res.json())
            .then(jsonData => initializeFlightMap(jsonData))
            .catch(err => console.error("Error loading JSON:", err));
        });

        return { globeViz };
      }
    };

    // Router setup with fallback guards to prevent white screen crashes if a variable is missing
    const router = createRouter({
      history: createWebHashHistory(),
      routes: [
        { path: '/', component: HomeGlobe },
        { path: '/bangui', component: typeof BanguiDestination !== 'undefined' ? BanguiDestination : DummyComponent },
        { path: '/kinshasa', component: typeof KinshasaDestination !== 'undefined' ? KinshasaDestination : DummyComponent },
        { path: '/new-delhi', component: typeof NewDelhiDestination !== 'undefined' ? NewDelhiDestination : DummyComponent },
        { path: '/paris', component: typeof ParisDestination !== 'undefined' ? ParisDestination : DummyComponent },
        { path: '/shanghai', component: typeof ShanghaiDestination !== 'undefined' ? ShanghaiDestination : DummyComponent },
        { path: '/taipei', component: typeof TaipeiDestination !== 'undefined' ? TaipeiDestination : DummyComponent },
        { path: '/tel-aviv', component: typeof TelAvivDestination !== 'undefined' ? TelAvivDestination : DummyComponent }
      ]
    });

    const app = Vue.createApp({});
    app.use(router);
    app.mount('#app');
  </script>
</body>
</html>
